name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'CRUDExplorer.slnx'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Extract changelog for version
      id: changelog
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if [ -f "CHANGELOG.md" ]; then
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
        else
          NOTES="Release version ${VERSION}"
        fi
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_version.outputs.tag }}
        body: |
          ## CRUDExplorer ${{ steps.get_version.outputs.version }}

          ${{ steps.changelog.outputs.notes }}

          ### Documentation
          - [README](https://github.com/satoshikosugi/CRUDExplorer/blob/main/README.md)
          - [Release Notes](https://github.com/satoshikosugi/CRUDExplorer/blob/main/docs/RELEASE_NOTES_v1.0.0.md)
          - [Deployment Guide](https://github.com/satoshikosugi/CRUDExplorer/blob/main/docs/DEPLOYMENT.md)

          ### Downloads
          Download the binaries from the Assets section below.
        draft: false
        prerelease: false
        generate_release_notes: true

  build-binaries:
    name: Build Release Binaries
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact_name: CRUDExplorer-Windows-x64
          - os: macos-latest
            runtime: osx-x64
            artifact_name: CRUDExplorer-macOS-x64
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: CRUDExplorer-Linux-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Publish self-contained
      run: |
        dotnet publish src/CRUDExplorer.UI/CRUDExplorer.UI.csproj \
          --configuration Release \
          --runtime ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:Version=${{ steps.get_version.outputs.version }} \
          --output ./publish/${{ matrix.runtime }}

    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/${{ matrix.runtime }}/* -DestinationPath ./${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.zip

    - name: Create archive (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd ./publish/${{ matrix.runtime }}
        tar -czf ../../${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.tar.gz *

    - name: Upload release asset (Windows)
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: ./${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.zip

    - name: Upload release asset (Unix)
      if: matrix.os != 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: ./${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.tar.gz

  build-docker:
    name: Build and Push Docker Image
    needs: create-release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get version from tag
      id: get_version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./src/CRUDExplorer.AuthServer
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/crudexplorer-authserver:${{ steps.get_version.outputs.version }}
          ${{ secrets.DOCKER_USERNAME }}/crudexplorer-authserver:latest
        labels: |
          org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.revision=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
